  <!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>The Wonderful Calculator 🎈</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <!--calculator card -->
    <div class="calculator-card">
        <h2>✨ The Wonderful Calculator ✨</h2>
        <p class="subtitle">Enter the numbers and discover the result instantly!</p>
              <!--input-container  -->
        <div class="inputs-container">
               <!-- input-box first numper -->
            <div class="input-box">
                <label>First Number (F)</label>
                <input type="number" id="firstNumber" placeholder="e.g.: 10">
            </div>

            <!-- input-box last numper -->
            <div class="input-box">
                <label>Last Number (L)</label>
                <input type="number" id="lastNumber" placeholder="e.g.: 5">
            </div>
        </div>

        <!-- submit -->
        <button id="submitBtn" onclick="calculateAndShow()">Click Here to Calculate! 🚀</button>

        <!-- result -->
        <div class="result-box" id="resultContainer">
            <span class="result-label">Result (R):</span>
            <span id="resultValue"></span>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
